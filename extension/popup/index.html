<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageMD - Convert to Markdown</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }

    .container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: white;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .logo svg {
      width: 36px;
      height: 36px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: white;
      margin-bottom: 8px;
      text-align: center;
    }

    .tagline {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 20px;
      text-align: center;
    }

    .url-display {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 280px;
    }

    .url-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .url-text {
      font-size: 12px;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
    }

    .button {
      background: white;
      color: #667eea;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      min-width: 140px;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    .button:active:not(:disabled) {
      transform: translateY(0);
    }

    .button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status {
      margin-top: 16px;
      font-size: 13px;
      color: white;
      text-align: center;
      min-height: 20px;
    }

    .status.loading {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status.success {
      color: #86efac;
    }

    .status.error {
      color: #fca5a5;
    }

    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
    }

    .footer kbd {
      background: rgba(255, 255, 255, 0.2);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <line x1="10" y1="9" x2="8" y2="9"/>
      </svg>
    </div>

    <h1>PageMD</h1>
    <p class="tagline">Convert webpage to clean markdown</p>

    <div class="url-display">
      <div class="url-label">Current Page</div>
      <div class="url-text" id="urlText">Loading...</div>
    </div>

    <button class="button" id="convertBtn">Convert to Markdown</button>

    <div class="status" id="status"></div>

    <div class="footer">
      Press <kbd>Ctrl+Shift+M</kbd> to convert instantly
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
